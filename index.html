<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jazz HQ — Weekly Leaderboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Jazz HQ</div>
    <nav class="nav">
      <a href="#" class="active">Leaderboard</a>
      <a href="#">Predictions</a>
      <a href="#">Games</a>
      <a href="#">Profile</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <div class="card-header">
        <h1>Weekly Leaderboard</h1>
        <div class="muted" id="weekRange">Loading week…</div>
      </div>

      <div class="controls">
        <button id="refreshBtn">Refresh</button>
        <label class="toggle">
          <input type="checkbox" id="includeAllUsers" />
          <span>Include users with 0 points</span>
        </label>
      </div>

      <table class="table" aria-label="weekly leaderboard">
        <thead>
          <tr>
            <th>Rank</th>
            <th>User</th>
            <th class="right">Points</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <tr><td colspan="3" class="muted">Loading…</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
